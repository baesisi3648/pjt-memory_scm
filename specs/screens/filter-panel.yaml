version: "2.0"

screen:
  name: 필터 오버레이 패널
  route: null  # 대시보드 내 오버레이
  layout: full-width
  auth: true

data_requirements:
  - resource: companies
    needs: [id, name, name_kr, cluster_id, tier]

  - resource: clusters
    needs: [id, name, tier]

  - resource: alerts
    needs: [company_id]
    note: 알림 있는 기업 표시용 (red dot)

  - resource: user_filters
    needs: [id, name, company_ids, is_default]
    filters: { user_id: ":current_user" }

components:
  - id: panel_header
    type: container
    position: header
    function: "기업 필터" 제목 + 닫기 버튼

  - id: search_input
    type: input
    variant: search
    position: header
    function: 기업명 실시간 검색
    events:
      - on: input
        action: filter_company_list(query)

  - id: preset_selector
    type: button
    variant: ghost
    position: main
    function: 프리셋 버튼 (전체, 상위 100개, 메모리 공급사, 장비사만)
    events:
      - on: click
        action: apply_preset(preset_id)

  - id: cluster_accordion
    type: list
    position: main
    function: 클러스터별 아코디언으로 기업 체크박스 표시
    data_source:
      resource: [clusters, companies]
    children:
      - id: company_checkbox
        type: checkbox
        function: 개별 기업 선택/해제
    events:
      - on: toggle
        action: update_selection(company_id)

  - id: footer_actions
    type: container
    position: footer
    function: 초기화 + 적용 버튼
    children:
      - id: reset_button
        type: button
        variant: secondary
        function: 필터 초기화
        events:
          - on: click
            action: reset_filter
      - id: apply_button
        type: button
        variant: primary
        function: 필터 적용 → 그래프 업데이트
        events:
          - on: click
            action: apply_filter + close(filter_panel)

connections:
  navigations:
    - apply: update(dashboard.value_chain_graph)

tests:
  - name: 프리셋 적용
    when: "상위 100개" 프리셋 클릭 후 적용
    then: [100개 기업 체크, 그래프에 100개 노드만 표시]

  - name: 기업 검색
    when: 검색창에 "Samsung" 입력
    then: [매칭되는 기업만 리스트에 표시]

  - name: 수동 선택
    when: 개별 기업 체크박스 선택 후 적용
    then: [선택된 기업 노드만 그래프에 표시]

design_reference:
  image: memory_scm_design/company_filter_overlay/screen.png
  html: memory_scm_design/company_filter_overlay/code.html
  notes:
    - 프리셋 버튼 한국어 (전체, 상위 100개, 메모리 공급사, 장비사만)
    - 클러스터 아코디언 한국어 (원자재, 장비사, 메모리 제조, 설계 및 디자인)
    - 선택 카운트 배지 (3/12 등)
    - 하단 초기화 + 적용 버튼 (체크 아이콘 포함)
