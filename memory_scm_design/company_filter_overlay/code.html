<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Company Filter Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "primary-hover": "#1d4ed8",
                        "primary-light": "#eff6ff",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1f2937",
                        "border-light": "#e2e8f0",
                        "border-dark": "#374151",
                        "text-main-light": "#0f172a",
                        "text-main-dark": "#f1f5f9",
                        "text-sub-light": "#64748b",
                        "text-sub-dark": "#94a3b8",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-gray-200 dark:bg-gray-900 font-display flex items-center justify-center min-h-screen">
<!-- Overlay Background Mockup -->
<div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 flex justify-end">
<!-- Filter Panel -->
<div class="w-full max-w-[360px] h-full bg-surface-light dark:bg-surface-dark shadow-2xl flex flex-col z-50 animate-in slide-in-from-right duration-300">
<!-- Header -->
<div class="px-5 py-4 border-b border-border-light dark:border-border-dark flex items-center justify-between shrink-0">
<h2 class="text-xl font-bold text-text-main-light dark:text-text-main-dark tracking-tight">기업 필터</h2>
<button aria-label="Close filter" class="text-text-sub-light dark:text-text-sub-dark hover:bg-gray-100 dark:hover:bg-gray-800 p-1.5 rounded-full transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<!-- Search -->
<div class="px-5 py-3 shrink-0">
<div class="relative group">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-text-sub-light dark:text-text-sub-dark group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">search</span>
</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-background-light dark:bg-background-dark border border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-sm text-text-main-light dark:text-text-main-dark placeholder-text-sub-light dark:placeholder-text-sub-dark outline-none transition-all" placeholder="기업명 검색" type="text"/>
</div>
</div>
<!-- Presets (Pills) -->
<div class="px-5 pb-4 border-b border-border-light dark:border-border-dark shrink-0">
<div class="flex flex-wrap gap-2">
<button class="px-3 py-1.5 bg-primary text-white text-xs font-medium rounded-full shadow-sm hover:bg-primary-hover transition-colors">
                        전체
                    </button>
<button class="px-3 py-1.5 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark text-text-sub-light dark:text-text-sub-dark hover:text-primary hover:border-primary dark:hover:text-primary dark:hover:border-primary text-xs font-medium rounded-full transition-colors">
                        상위 100개
                    </button>
<button class="px-3 py-1.5 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark text-text-sub-light dark:text-text-sub-dark hover:text-primary hover:border-primary dark:hover:text-primary dark:hover:border-primary text-xs font-medium rounded-full transition-colors">
                        메모리 공급사
                    </button>
<button class="px-3 py-1.5 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark text-text-sub-light dark:text-text-sub-dark hover:text-primary hover:border-primary dark:hover:text-primary dark:hover:border-primary text-xs font-medium rounded-full transition-colors">
                        장비사만
                    </button>
</div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-5 py-4 space-y-3 custom-scrollbar">
<!-- Accordion Item 1: Open -->
<div class="rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-gray-800 overflow-hidden group">
<summary class="flex cursor-pointer items-center justify-between px-4 py-3 select-none bg-background-light dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors">
<div class="flex items-center gap-2">
<span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">원자재</span>
<span class="px-1.5 py-0.5 rounded-md bg-primary/10 text-primary text-[10px] font-bold">3/12</span>
</div>
<span class="material-symbols-outlined text-text-sub-light dark:text-text-sub-dark text-[20px] transition-transform duration-200">expand_less</span>
</summary>
<div class="px-4 pb-3 pt-1 space-y-1 bg-white dark:bg-gray-800 border-t border-border-light dark:border-border-dark">
<label class="flex items-center gap-3 p-2 rounded-lg hover:bg-background-light dark:hover:bg-background-dark cursor-pointer group/item transition-colors">
<input checked="" class="w-4 h-4 rounded text-primary border-gray-300 dark:border-gray-600 focus:ring-primary focus:ring-offset-0 bg-transparent transition-colors" type="checkbox"/>
<span class="text-sm text-text-main-light dark:text-text-main-dark group-hover/item:text-primary transition-colors">SK실트론</span>
</label>
<label class="flex items-center gap-3 p-2 rounded-lg hover:bg-background-light dark:hover:bg-background-dark cursor-pointer group/item transition-colors">
<input checked="" class="w-4 h-4 rounded text-primary border-gray-300 dark:border-gray-600 focus:ring-primary focus:ring-offset-0 bg-transparent transition-colors" type="checkbox"/>
<span class="text-sm text-text-main-light dark:text-text-main-dark group-hover/item:text-primary transition-colors">솔브레인</span>
</label>
<label class="flex items-center gap-3 p-2 rounded-lg hover:bg-background-light dark:hover:bg-background-dark cursor-pointer group/item transition-colors">
<input checked="" class="w-4 h-4 rounded text-primary border-gray-300 dark:border-gray-600 focus:ring-primary focus:ring-offset-0 bg-transparent transition-colors" type="checkbox"/>
<span class="text-sm text-text-main-light dark:text-text-main-dark group-hover/item:text-primary transition-colors">동진쎄미켐</span>
</label>
<label class="flex items-center gap-3 p-2 rounded-lg hover:bg-background-light dark:hover:bg-background-dark cursor-pointer group/item transition-colors">
<input class="w-4 h-4 rounded text-primary border-gray-300 dark:border-gray-600 focus:ring-primary focus:ring-offset-0 bg-transparent transition-colors" type="checkbox"/>
<span class="text-sm text-text-main-light dark:text-text-main-dark group-hover/item:text-primary transition-colors">후성</span>
</label>
<label class="flex items-center gap-3 p-2 rounded-lg hover:bg-background-light dark:hover:bg-background-dark cursor-pointer group/item transition-colors">
<input class="w-4 h-4 rounded text-primary border-gray-300 dark:border-gray-600 focus:ring-primary focus:ring-offset-0 bg-transparent transition-colors" type="checkbox"/>
<span class="text-sm text-text-main-light dark:text-text-main-dark group-hover/item:text-primary transition-colors">원익머트리얼즈</span>
</label>
</div>
</div>
<!-- Accordion Item 2: Closed -->
<details class="rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-gray-800 overflow-hidden group">
<summary class="flex cursor-pointer items-center justify-between px-4 py-3 select-none bg-background-light dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors">
<div class="flex items-center gap-2">
<span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">장비사</span>
<span class="px-1.5 py-0.5 rounded-md bg-gray-100 dark:bg-gray-700 text-text-sub-light dark:text-text-sub-dark text-[10px] font-bold">2/8</span>
</div>
<span class="material-symbols-outlined text-text-sub-light dark:text-text-sub-dark text-[20px] group-open:rotate-180 transition-transform duration-200">expand_more</span>
</summary>
<div class="px-4 pb-3 pt-1 space-y-1 bg-white dark:bg-gray-800 border-t border-border-light dark:border-border-dark">
<p class="text-xs text-text-sub-light dark:text-text-sub-dark px-2 py-1">Loading items...</p>
</div>
</details>
<!-- Accordion Item 3: Closed -->
<details class="rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-gray-800 overflow-hidden group">
<summary class="flex cursor-pointer items-center justify-between px-4 py-3 select-none bg-background-light dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors">
<div class="flex items-center gap-2">
<span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">메모리 제조</span>
<span class="px-1.5 py-0.5 rounded-md bg-gray-100 dark:bg-gray-700 text-text-sub-light dark:text-text-sub-dark text-[10px] font-bold">1/5</span>
</div>
<span class="material-symbols-outlined text-text-sub-light dark:text-text-sub-dark text-[20px] group-open:rotate-180 transition-transform duration-200">expand_more</span>
</summary>
<div class="px-4 pb-3 pt-1 space-y-1 bg-white dark:bg-gray-800 border-t border-border-light dark:border-border-dark">
<p class="text-xs text-text-sub-light dark:text-text-sub-dark px-2 py-1">Loading items...</p>
</div>
</details>
<!-- Accordion Item 4: Closed -->
<details class="rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-gray-800 overflow-hidden group">
<summary class="flex cursor-pointer items-center justify-between px-4 py-3 select-none bg-background-light dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors">
<div class="flex items-center gap-2">
<span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">설계 및 디자인</span>
<span class="px-1.5 py-0.5 rounded-md bg-gray-100 dark:bg-gray-700 text-text-sub-light dark:text-text-sub-dark text-[10px] font-bold">0/4</span>
</div>
<span class="material-symbols-outlined text-text-sub-light dark:text-text-sub-dark text-[20px] group-open:rotate-180 transition-transform duration-200">expand_more</span>
</summary>
<div class="px-4 pb-3 pt-1 space-y-1 bg-white dark:bg-gray-800 border-t border-border-light dark:border-border-dark">
<p class="text-xs text-text-sub-light dark:text-text-sub-dark px-2 py-1">Loading items...</p>
</div>
</details>
</div>
<!-- Sticky Footer -->
<div class="p-5 border-t border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark shrink-0">
<div class="flex gap-3">
<button class="flex-1 py-2.5 px-4 rounded-lg border border-border-light dark:border-border-dark text-text-main-light dark:text-text-main-dark font-semibold text-sm hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">refresh</span>
                        초기화
                    </button>
<button class="flex-1 py-2.5 px-4 rounded-lg bg-primary text-white font-semibold text-sm hover:bg-primary-hover shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">check</span>
                        적용
                    </button>
</div>
</div>
</div>
</div>
<!-- Styles for custom scrollbar -->
<style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #64748b;
        }
    </style>
</body></html>
