<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Memory SCM Platform Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "background-light": "#f8fafc", 
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<!-- Login Card Container -->
<div class="w-full max-w-[420px] bg-white dark:bg-[#1e293b] rounded-lg shadow-lg p-12 flex flex-col gap-8 border border-slate-100 dark:border-slate-700">
<!-- Header Section -->
<div class="flex flex-col items-center gap-2 text-center">
<div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary text-3xl">memory</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">Memory SCM</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Intelligence Platform</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-5 w-full">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium" for="email">이메일</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="form-input w-full rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 h-11 pl-10 pr-3 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium" for="password">비밀번호</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="form-input w-full rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 h-11 pl-10 pr-10 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 cursor-pointer flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-blue-700 text-white font-bold h-11 rounded-lg text-sm transition-colors mt-2 shadow-sm shadow-blue-500/20">
                Login
            </button>
</form>
<!-- Footer -->
<div class="text-center pt-2">
<p class="text-slate-400 dark:text-slate-500 text-xs font-normal">© 2024 Memory SCM</p>
</div>
</div>
</body></html>
